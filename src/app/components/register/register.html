<div class="container">
  <h2 class="mb-4">Cadastro de Despesa</h2>

  <div class="row mb-4">
    <div class="col-md-2">
      <select class="form-control" [ngModel]="selectedYear()" (ngModelChange)="selectedYear.set($event); updateDays()">
        <option [ngValue]="null" disabled>Ano</option>
        @for (year of years(); track year) {
          <option [ngValue]="year">{{ year }}</option>
        }
      </select>
    </div>

    <div class="col-md-2">
      <select class="form-control" [ngModel]="selectedMonth()" (ngModelChange)="selectedMonth.set($event); updateDays()">
        <option value="" disabled>Mês</option>
        @for (month of months(); track month) {
          <option [value]="month">{{ month }}</option>
        }
      </select>
    </div>

    <div class="col-md-2">
      <select class="form-control" [ngModel]="selectedDay()" (ngModelChange)="selectedDay.set($event)">
        <option [ngValue]="null" disabled>Dia</option>
        @for (day of days(); track day) {
          <option [ngValue]="day">{{ day }}</option>
        }
      </select>
    </div>

    <div class="col-md-6">
      <select class="form-control" [ngModel]="selectedType()" (ngModelChange)="selectedType.set($event)">
        <option value="" disabled>Tipo</option>
        @for (type of types(); track type) {
          <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>
  </div>

  <div class="row mb-5">
    <div class="col-md-8">
      <input
        class="form-control"
        type="text"
        placeholder="Descrição"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        (keyup.enter)="register()"
      />
    </div>

    <div class="col-md-2">
      <input
        class="form-control"
        type="number"
        placeholder="Valor"
        [ngModel]="value()"
        (ngModelChange)="value.set($event)"
        (keyup.enter)="register()"
      />
    </div>

    <div class="col-md-2 d-flex justify-content-end">
      <button type="button" class="btn btn-dark" (click)="register()">
        <i class="fas fa-plus"></i> Cadastrar
      </button>
    </div>
  </div>
</div>
